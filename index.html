<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Resume Builder</h1>

<div class="form">
    <input type="text" id="name" placeholder="Name"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="text" id="phone" placeholder="Phone"><br><br>

    <textarea id="education" placeholder="Education"></textarea><br><br>

    <textarea id="skills" placeholder="Skills"></textarea><br><br>

    <textarea id="experience" placeholder="Experience"></textarea><br><br>

    <button onclick="generateResume()">Generate Resume</button>
</div>

<hr>

<div id="resume"></div>

<button onclick="window.print()">Print to PDF</button>

<script src="script.js"></script>

</body>
</html>
